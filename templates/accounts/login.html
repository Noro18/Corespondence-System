<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Correspondence System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Correspondence System</h1>
      <p class="text-gray-500 mt-1">RAEOA / ZEEMS-TL</p>
    </div>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      {% if form.errors %}
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-sm">
        Invalid username or password. Please try again.
      </div>
      {% endif %}

      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" id="id_username" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" id="id_password" required
               class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit"
              class="w-full bg-blue-900 text-white py-2 rounded hover:bg-blue-800 font-medium">
        Login
      </button>

      <input type="hidden" name="next" value="{{ next }}">
    </form>

    <div class="mt-6 pt-4 border-t border-gray-200 text-center text-sm">
      <a href="{% url 'admin:index' %}" class="text-blue-600 hover:underline">Admin Login</a>
    </div>
  </div>

</body>
</html>
